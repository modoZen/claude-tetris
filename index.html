<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <div class="top-bar">
      <h1 class="game-title">TETRIS</h1>
      <label class="theme-toggle" title="Alternar modo claro/oscuro">
        <input type="checkbox" id="theme-toggle-input" />
        <span class="theme-toggle-track">
          <span class="theme-toggle-thumb"></span>
        </span>
      </label>
    </div>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul id="controls-list">
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> / <kbd>Esc</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box" id="gameover-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>
        <button id="restart-btn">Reiniciar</button>
      </div>

      <div class="overlay-box pause-menu hidden" id="pause-menu">
        <p class="pause-title">PAUSA</p>

        <div class="pause-actions">
          <button id="resume-btn">Reanudar</button>
          <button id="pause-restart-btn">Reiniciar</button>
        </div>

        <div class="pause-section">
          <span class="label">NIVEL INICIAL</span>
          <div class="level-stepper">
            <button id="level-dec-btn" type="button" aria-label="Bajar nivel inicial">−</button>
            <input type="number" id="start-level-input" min="1" max="20" value="1" />
            <button id="level-inc-btn" type="button" aria-label="Subir nivel inicial">+</button>
          </div>
        </div>

        <div class="pause-section controls">
          <span class="label">CONTROLES</span>
          <ul id="pause-controls-list"></ul>
        </div>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
